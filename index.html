<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Coffee Igloo</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <header class="site-header">
      <h1>The Coffee Igloo</h1>
      <p>Discover and manage healthy coffee recipes.</p>

      <nav class="main-nav">
        <a href="#">Home</a>
        <a href="#recipes-container">Recipes</a>
        <a href="documentation.html">Docs</a>
      </nav>
    </header>

    <main>
      <section class="search-section">
        <h2>Search Recipes</h2>

        <label for="search">Search</label>
        <input type="text" id="search" placeholder="Search recipes..." />
      </section>

      <form id="recipe-form" class="recipe-form">
        <h2>Add Recipe</h2>

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Recipe name" />

        <label for="category">Category</label>
        <select id="category">
          <option>High Protein</option>
          <option>Low Calorie</option>
          <option>Vegan</option>
          <option>Dairy Free</option>
          <option>Decaf</option>
          <option>Energy Boost</option>
        </select>

        <label for="calories">Calories</label>
        <input type="number" id="calories" placeholder="e.g. 180" />

        <label for="protein">Protein</label>
        <input type="number" id="protein" placeholder="e.g. 25" />

        <label for="prep-time">Preparation Time</label>
        <input type="number" id="prep-time" placeholder="Minutes" />

        <label for="ingredients">Ingredients</label>
        <textarea
          id="ingredients"
          placeholder="Coffee, oat milk, vanilla protein powder..."
        ></textarea>

        <label for="instructions">Instructions</label>
        <textarea
          id="instructions"
          placeholder="Mix all ingredients, add ice and blend..."
        ></textarea>

        <button type="submit">Add Recipe</button>
      </form>

      <section class="recipes-section">
        <h2>Recipes</h2>

        <section id="recipes-container"></section>
      </section>
    </main>
    <footer>
      <p>© 2026 The Coffee Igloo | API Recipe Manager</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
